<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>AdKerala Display</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="pairing-screen">
    <div class="pairing-box">
      <div class="pairing-label">Pairing ID</div>
      <div id="pairing-id-value">——————</div>
      <p class="pairing-hint">Enter this in the Admin dashboard's "Pair a Bus" card to link this bus.</p>
    </div>
  </div>

  <div id="connect-screen">
    <div class="connect-box">
      <img id="connect-qr" src="/api/panel-qr.svg" alt="Scan to open the Control Panel" />
      <div class="connect-label">Scan to connect</div>
      <p class="connect-hint">Driver/conductor: scan this with your phone's camera to open this bus's Control Panel, then enter the connect code once.</p>
    </div>
  </div>

  <div id="normal-view">
    <div id="route-name-label"></div>
    <div id="paired-badge">✓ Paired with AdKerala</div>
    <div id="connect-badge"><img src="/api/panel-qr.svg" alt="Scan to connect another phone" /></div>

    <div id="ad-area">
      <video id="ad-video" muted playsinline></video>
      <img id="ad-banner" alt="" />
      <div id="idle-message">AdKerala</div>
    </div>

    <div id="progress-strip">
      <div id="stops-track"></div>
    </div>
  </div>

  <audio id="audio-player"></audio>

  <script src="app.js"></script>
</body>
</html>
